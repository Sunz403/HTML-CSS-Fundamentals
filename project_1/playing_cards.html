<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="Styles.css"/>
</head>

  <main id="playing-cards">
    
    <div class="card">
      <div class="left">
        <p class="diamond">7</p>
        <p class="diamond">♦</p>
      </div>
      <div class="middle">
        <pre class="diamond">
♦      ♦
   ♦
♦      ♦

♦      ♦
        </pre>
      </div>
      <div class="right">
        <p class="diamond">♦</p>
        <p class="diamond">7</p>
      </div>
    </div>
    <div class="card special">
      <div class="left">
        <p>7</p>
        <p>♠</p>
      </div>
      <div class="middle">
        <pre>
♠      ♠
   ♠
♠      ♠

♠      ♠
        </pre>
      </div>
      <div class="right">
        <p>♠</p>
        <p>7</p>
      </div>
    </div>
    <div class="card">
      <div class="left">
        <p class="heart">7</p>
        <p class="heart">♥</p>
      </div>
      <div class="middle">
        <pre class="heart">
♥      ♥
   ♥
♥      ♥

♥      ♥
        </pre>
      </div>
      <div class="right">
         <p class="heart">♥</p>
        <p class="heart">7</p>
      </div>
    </div>
  </main>

<body>

</body>

</html>
